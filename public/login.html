<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS Login</title>
    <link rel="stylesheet" href="./login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">

    <!-- Left Section -->
    <div class="login-left">
        <h1>Payroll<br>Management System</h1>
        <p>Manage employees, payroll, attendance<br>and reports efficiently.</p>
    </div>

    <!-- Right Section -->
    <div class="login-right">
        <form class="login-card" id="loginForm">
            <h2>Welcome Back</h2>
            <span>Please login to your account</span>
            <div class="role-selection">
                <label class="role-option">
                    <input type="radio" name="role" value="admin" checked>
                    <span>Admin</span>
                </label>

                <label class="role-option">
                    <input type="radio" name="role" value="user">
                    <span>User</span>
                </label>
            </div>

            <div class="input-group">
                <label>Email / Username</label>
                    <input type="text" id="username" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                     <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit">Login</button>

            <p class="role-text">Access provided based on your role (Admin/User)</p>
        </form>
    </div>

</div>
<script>

const API = "http://localhost:5000";

document.getElementById("loginForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const role = document.querySelector('input[name="role"]:checked').value;
    console.log("Logging in with", { username, password, role });
    try {

        const res = await fetch("http://localhost:5000/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name: username,
                password: password
            })

        });

        const data = await res.json();

        if(data.success) {

            // store session
            localStorage.setItem("empId", data.id);
            localStorage.setItem("name", data.name);
            localStorage.setItem("role", data.role);

            // redirect based on role
            if(data.role === "admin") {

                window.location.href = "../adminSide/dashboard.html";

            } else {

                window.location.href = "../userSide/userDashboard.html";

            }

        } else {

            alert("Login failed: " + data.message);

        }

    } catch(error) {

        alert("Server error. Is backend running?");

    }

});

</script>
</body>
</html>
