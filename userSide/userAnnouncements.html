<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - User</title>
    <link rel="stylesheet" href="./userCSS/userDashboard.css">
    <link rel="stylesheet" href="./userCSS/userAnnouncements.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">ABC MARKETING</div>
            <nav class="menu">
                <a href="./userDashboard.html" class="menu-item"><span class="material-icons">home</span> Dashboard</a>
                <a href="./userAttendence.html" class="menu-item"><span class="material-icons">check_box</span> Attendance</a>
                <a href="./userAnnouncements.html" class="menu-item active"><span class="material-icons">notifications</span> Announcements</a>
                <a href="./userWorkUpdates.html" class="menu-item"><span class="material-icons">mail</span> Work Updates</a>
                <a href="./userLeave.html" class="menu-item"><span class="material-icons">event_busy</span> Leave Management</a>
                <a href="./userPaysilp.html" class="menu-item"><span class="material-icons">description</span> Payslip</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="menu-item" onclick="logout()"><span class="material-icons">logout</span> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="welcome">
                    Welcome, <span id="username">Loading...</span>
                    <h1>Announcements</h1>
                </div>
                <div class="header-actions">
                    <span class="material-icons account">account_circle</span>
                </div>
            </header>

            <section class="dashboard-sections">
                <div class="section announce">
                    <h2>Announcements</h2>
                    <hr style="background:black; height:2px; border:none; margin:10px 0;">
                    <div id="announcementList">
                        <p>Loading...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API = "http://localhost:5000";
        const empId = localStorage.getItem("empId") || 1;

        async function loadUser() {
            const res = await fetch(`${API}/user/${empId}`);
            const user = await res.json();
            document.getElementById("username").textContent = user.name;
        }

        async function loadAnnouncements() {
            const res = await fetch(`${API}/announcements`);
            const data = await res.json();
            const list = document.getElementById("announcementList");
            if (data.length === 0) {
                list.innerHTML = `<p>No announcements yet.</p>`;
                return;
            }
            list.innerHTML = data.map(a => `
                <div class="announcement-card">
                    <p class="announcement-text">${a.text}</p>
                    <small class="announcement-date">${a.created_at}</small>
                </div>
            `).join("");
        }

        function logout() {
            localStorage.clear();
            window.location.href = "../public/login.html";
        }

        loadUser();
        loadAnnouncements();
    </script>
</body>
</html>
