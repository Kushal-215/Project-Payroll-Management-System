<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Updates - User</title>
    <link rel="stylesheet" href="./userCSS/userDashboard.css">
    <link rel="stylesheet" href="./userCSS/userWork.css">
    <script src="../JS File/userHeader.js" defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">ABC MARKETING</div>
            <nav class="menu">
                <a href="./userDashboard.html" class="menu-item"><span class="material-icons">home</span> Dashboard</a>
                <a href="./userAttendence.html" class="menu-item"><span class="material-icons">check_box</span> Attendance</a>
                <a href="./userAnnouncements.html" class="menu-item"><span class="material-icons">notifications</span> Announcements</a>
                <a href="./userWorkUpdates.html" class="menu-item active"><span class="material-icons">mail</span> Work Updates</a>
                <a href="./userLeave.html" class="menu-item"><span class="material-icons">event_busy</span> Leave Management</a>
                <a href="./userPaysilp.html" class="menu-item"><span class="material-icons">description</span> Payslip</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="menu-item" onclick="logout()"><span class="material-icons">logout</span> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="welcome">
                    Welcome, <span class="username">Loading...</span>
                    <h1>Work Updates</h1>
                </div>
                
            </header>

            <section class="stats-cards">
                <div class="card card1">
                    <span class="cardInfo">
                        <h2 id="totalTasks">0</h2>
                        <p>Total Tasks</p>
                    </span>
                </div>
                <div class="card card2">
                    <span class="cardInfo">
                        <h2 id="pendingTasks">0</h2>
                        <p>Pending</p>
                    </span>
                </div>
                <div class="card card3">
                    <span class="cardInfo">
                        <h2 id="inProgressTasks">0</h2>
                        <p>In Progress</p>
                    </span>
                </div>
                <div class="card card4">
                    <span class="cardInfo">
                        <h2 id="doneTasks">0</h2>
                        <p>Done</p>
                    </span>
                </div>
            </section>

            <section class="dashboard-sections">
                <!-- Add Task -->
                <div class="section workUpdates">
                    <div class="task-header">
                        <h2>My Tasks</h2>
                        <span class="material-icons add-task-btn" onclick="openTaskPopup()">add</span>
                    </div>

                    <!-- Filter -->
                    <div class="task-filter">
                        <button onclick="filterTasks('All')" class="filter-btn active" id="filter-All">All</button>
                        <button onclick="filterTasks('Pending')" class="filter-btn" id="filter-Pending">Pending</button>
                        <button onclick="filterTasks('In Progress')" class="filter-btn" id="filter-In Progress">In Progress</button>
                        <button onclick="filterTasks('Done')" class="filter-btn" id="filter-Done">Done</button>
                    </div>

                    <div id="taskList"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Task Popup -->
    <div id="taskPopup" class="pop">
        <div class="pop-content">
            <span class="close" onclick="closeTaskPopup()">&times;</span>
            <h3 id="taskPopupTitle">Add Task</h3>
            <input type="text" id="taskTitle" placeholder="Task title" style="width:100%; padding:8px; margin-top:15px; border:1px solid #ccc; border-radius:8px;">
            <textarea id="taskDesc" placeholder="Description (optional)" style="width:100%; padding:8px; margin-top:10px; border:1px solid #ccc; border-radius:8px; height:80px; resize:none;"></textarea>
            <select id="taskStatus" style="width:100%; padding:8px; margin-top:10px; border:1px solid #ccc; border-radius:8px;">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
            <br>
            <button onclick="saveTask()" style="margin-top:15px;">Save Task</button>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000";
        const empId = localStorage.getItem("empId") || 1;
        let tasks = JSON.parse(localStorage.getItem(`tasks_${empId}`) || "[]");
        let editingTaskId = null;
        let currentFilter = "All";

        async function loadUser() {
            const res = await fetch(`${API}/user/${empId}`);
            const user = await res.json();
            document.getElementById("username").textContent = user.name;
        }

        function saveTasks() {
            localStorage.setItem(`tasks_${empId}`, JSON.stringify(tasks));
            updateStats();
        }

        function updateStats() {
            document.getElementById("totalTasks").textContent = tasks.length;
            document.getElementById("pendingTasks").textContent = tasks.filter(t => t.status === "Pending").length;
            document.getElementById("inProgressTasks").textContent = tasks.filter(t => t.status === "In Progress").length;
            document.getElementById("doneTasks").textContent = tasks.filter(t => t.status === "Done").length;
        }

        function renderTasks() {
            const list = document.getElementById("taskList");
            const filtered = currentFilter === "All" ? tasks : tasks.filter(t => t.status === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `<p style="padding:10px; color:#999;">No tasks here.</p>`;
                return;
            }

            list.innerHTML = filtered.map(t => `
                <div class="task-item">
                    <div class="task-info">
                        <p class="task-title">${t.title}</p>
                        ${t.desc ? `<p class="task-desc">${t.desc}</p>` : ""}
                        <small>${t.created}</small>
                    </div>
                    <div class="task-right">
                        <span class="task-status ${t.status.toLowerCase().replace(' ', '-')}">${t.status}</span>
                        <div class="task-actions">
                            <button onclick="editTask('${t.id}')">Edit</button>
                            <button onclick="deleteTask('${t.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(`filter-${filter}`).classList.add("active");
            renderTasks();
        }

        function openTaskPopup() {
            editingTaskId = null;
            document.getElementById("taskTitle").value = "";
            document.getElementById("taskDesc").value = "";
            document.getElementById("taskStatus").value = "Pending";
            document.getElementById("taskPopupTitle").textContent = "Add Task";
            document.getElementById("taskPopup").style.display = "flex";
        }

        function closeTaskPopup() {
            document.getElementById("taskPopup").style.display = "none";
        }

        function saveTask() {
            const title = document.getElementById("taskTitle").value.trim();
            if (!title) { alert("Please enter a task title"); return; }

            if (editingTaskId) {
                const task = tasks.find(t => t.id === editingTaskId);
                task.title = title;
                task.desc = document.getElementById("taskDesc").value.trim();
                task.status = document.getElementById("taskStatus").value;
            } else {
                tasks.unshift({
                    id: Date.now().toString(),
                    title,
                    desc: document.getElementById("taskDesc").value.trim(),
                    status: document.getElementById("taskStatus").value,
                    created: new Date().toLocaleDateString()
                });
            }

            saveTasks();
            renderTasks();
            closeTaskPopup();
        }

        function editTask(id) {
            editingTaskId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById("taskTitle").value = task.title;
            document.getElementById("taskDesc").value = task.desc || "";
            document.getElementById("taskStatus").value = task.status;
            document.getElementById("taskPopupTitle").textContent = "Edit Task";
            document.getElementById("taskPopup").style.display = "flex";
        }

        function deleteTask(id) {
            if (!confirm("Delete this task?")) return;
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function logout() {
            const empId = localStorage.getItem("empId");
            fetch(`http://localhost:5000/user/${empId}/logout`, {
                method: "POST",
            }).finally(() => {
                localStorage.clear();
                window.location.href = "../public/login.html";
            });
        }

        loadUser();
        updateStats();
        renderTasks();
    </script>
</body>
</html>
